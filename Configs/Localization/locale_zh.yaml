# 多语言表 - 中文
# 前期如果还不想认真配表，也没关系。
# 代码里会优先查表，查不到就直接把 key 当成显示文字返回。

# 本文件用于配置“中文本地化词条”。
# 如果某个 name_key / description_key / title 等文本想通过翻译表统一管理，就写在这里。
#
# 顶层键说明：
# locale:
#   当前语言代号。
#   中文一般写 "zh"。
# translations:
#   翻译表。
#   左侧是 key，右侧是最终显示文本。
#
# 使用规则：
# - 当前项目允许你直接在 YAML 配置里写中文，不一定强制走翻译表。
# - 但如果你希望后续支持多语言，建议把常用文本逐步整理到这里。
# - key 和 value 都建议加双引号，避免冒号、空格等字符影响解析。
#
locale: "zh"
translations:
  "采集素材": "采集素材"
  "木材": "木材"
  "原木": "原木"
  "最基础的木材，通过砍树获得": "最基础的木材，通过砍树获得"
  "砍树": "砍树"
  "捡起石斧": "捡起石斧"
  "红魔馆": "红魔馆"
