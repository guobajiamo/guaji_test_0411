# 可重复点击事件

# 本文件用于定义“可重复点击事件”。
# 这类事件一般不会在触发一次后自动消失，适合手动采集、领取、交互等。
#
# 顶层键说明：
# events: 事件列表。
#
# 常用字段含义与 oneshot_events.yaml 基本一致，差别主要在：
# type:
#   这里通常写 "RepeatableClick"。
# prerequisites:
#   老格式互动前置条件。
#   为空 [] 表示按钮默认高亮可点。
# costs:
#   每点击一次就消耗一次。
# effects:
#   每点击一次就结算一次。
# button_list_group:
#   一般写 MainClick，表示出现在主交互区的普通点击事件列表中。
#
# 适合放在这里的事件例子：
# - 手动砍树
# - 重复领取测试材料
# - 可反复触发的商店前置交互
#
events:
  - id: "evt_click_chop"
    name_key: "点击砍树"
    description_key: "手动砍一下树，立即获得 1 个原木。"
    hover_info_key: "手动执行一次砍树动作。适合你想自己一点点体验流程时使用。"
    type: "RepeatableClick"
    prerequisites:
      - { condition_type: "HasItem", target_id: "tool_stone_axe", required_value: 1 }
    costs: []
    effects:
      - { effect_type: "GrantItem", target_id: "mat_wood_log", int_value: 1 }
    button_list_group: "MainClick"
