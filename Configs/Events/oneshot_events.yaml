# 一次性触发事件
# 开局先给玩家一个“捡起石斧”的按钮，便于后面测试整条流程。

# 本文件用于定义“一次性事件按钮”。
# 这类事件触发后通常会被消耗，不再重复出现。
#
# 顶层键说明：
# events: 事件列表。
#
# 当前这份老格式配置仍在使用 prerequisites。
# 兼容说明：
# - prerequisites 会被系统当作 interaction_conditions（互动前置条件）读取。
# - 如果你以后写新剧本，建议优先使用新三段条件写法：
#   display_condition_count + display_conditions
#   interaction_condition_count + interaction_conditions
#   hide_condition_count + hide_conditions
#
# 单个事件常用字段：
# id: 事件唯一 ID。
# name_key: 按钮标题。
# description_key: 事件描述。
# hover_info_key: 鼠标悬浮说明；不写时一般退回 description_key。
# type:
#   这里通常固定写 "OneshotClick"。
# prerequisites:
#   老格式互动前置条件列表。
#   留空 [] 表示默认可点击。
#   条件条目格式：
#   - condition_type: 条件类型
#   - target_id: 目标 ID
#   - required_value: 需求数量/等级/次数
# costs:
#   点击时要消耗的物品列表；为空 [] 表示无消耗。
# effects:
#   事件生效后的通用效果列表。
#   常见 effect_type：
#   GrantItem / RemoveItem / GrantGold / RemoveGold / GrantSkillExp / AddFactionReputation / UnlockZone / CompleteEvent / CompleteQuest / StartBattle
# button_list_group:
#   事件按钮所在分组。
#   当前常见：
#   MainOneshot / MainClick / MainIdle / None
#   None 常用于“隐藏分支事件”。
#
# dialog:
#   给一次性事件挂弹窗配置。
#   body_text: 弹窗正文
#   confirm_button_text: 单确认按钮文案
#   consume_source_event_on_choice: 多分支时是否消耗源事件
#   choices:
#     button_text = 按钮文字
#     target_event_id = 点击后真正执行的目标事件 ID
#
events:
  - id: "evt_pickup_stone_axe"
    name_key: "捡起石斧"
    description_key: "你在路边发现了一把粗糙的石斧，捡起来吧。"
    hover_info_key: "获得石斧，获得人生。获得第一个技能：砍树。"
    type: "OneshotClick"
    prerequisites: []
    costs: []
    effects:
      - { effect_type: "GrantItem", target_id: "tool_stone_axe", int_value: 1 }
    button_list_group: "MainOneshot"

  - id: "evt_read_chopping_notice"
    name_key: "阅读伐木心得"
    description_key: "阅读一段说明文字，了解刚入门时该怎么做。"
    hover_info_key: "这是单按钮弹窗的示例事件。点击后会先弹出说明框，再由你确认执行。"
    type: "OneshotClick"
    prerequisites:
      - { condition_type: "HasItem", target_id: "tool_stone_axe", required_value: 1 }
    costs: []
    effects:
      - { effect_type: "GrantGold", target_id: "", int_value: 5 }
    button_list_group: "MainOneshot"
    dialog:
      body_text: "你终于拿到了第一把石斧。\n接下来你可以先尝试点击砍树，也可以直接开始挂机砍树。\n这条弹窗演示的是“只有一个确认按钮”的配置方式。"
      confirm_button_text: "我知道了"

  - id: "evt_stranger_reward_offer"
    name_key: "路人的谢礼"
    description_key: "一位路人想给你一份谢礼，你决定如何回应？"
    hover_info_key: "这是双选项弹窗的示例事件。两个按钮只能二选一，并且会触发不同的一次性事件。"
    type: "OneshotClick"
    prerequisites:
      - { condition_type: "HasItem", target_id: "tool_stone_axe", required_value: 1 }
    costs: []
    effects: []
    button_list_group: "MainOneshot"
    dialog:
      body_text: "一位路人看你初来乍到，想送你一点谢礼。\n你可以接受一小袋金币，也可以婉拒后收下一份干粮。"
      consume_source_event_on_choice: true
      choices:
        - { button_text: "接受馈赠", target_event_id: "evt_accept_gift_gold" }
        - { button_text: "婉拒谢礼", target_event_id: "evt_decline_reward_food" }

  - id: "evt_accept_gift_gold"
    name_key: "接受馈赠"
    description_key: "你接受了谢礼，获得了一小袋金币。"
    hover_info_key: "这是隐藏分支事件，通常不直接显示在按钮列表里。"
    type: "OneshotClick"
    prerequisites: []
    costs: []
    effects:
      - { effect_type: "GrantGold", target_id: "", int_value: 30 }
    button_list_group: "None"

  - id: "evt_decline_reward_food"
    name_key: "婉拒谢礼"
    description_key: "你谢绝了金币，但收下了一份包子。"
    hover_info_key: "这是隐藏分支事件，通常不直接显示在按钮列表里。"
    type: "OneshotClick"
    prerequisites: []
    costs: []
    effects:
      - { effect_type: "GrantItem", target_id: "food_baozi", int_value: 1 }
    button_list_group: "None"
