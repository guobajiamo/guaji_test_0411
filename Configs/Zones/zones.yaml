# 本文件用于定义“副本/区域解锁链”。
# 当前 zone 更偏向“可反复通关的区域节点”，而不是左侧 UI 的一级/二级区域。
#
# 顶层键说明：
# zones: 区域列表。
#
# 单个区域支持的字段：
# id: 区域唯一 ID。
# name_key: 区域显示名。
# description_key: 区域说明文本。
# max_clear_count:
#   最大通关记录参考值。
# unlocks_zone_id:
#   通关/推进该区域后解锁的下一个区域 ID。
#   留空表示不直接解锁后继区域。
# unlocks_faction_id:
#   通关/推进后可解锁的势力 ID。
#   留空表示不解锁势力。
# unlock_conditions:
#   本区域自身的解锁条件列表。
#   条件格式与事件条件相同：
#   condition_type / target_id / required_value
#   例如：
#   ZoneCleared + 上一个 zone ID + 10
#   表示上一个区域通关 10 次后才开放这里。
#
zones:
  - id: "zone_forest_of_magic"
    name_key: "魔法之森"
    description_key: "充满危险蘑菇和妖精的森林。"
    max_clear_count: 10
    unlocks_zone_id: "zone_misty_lake"
    unlocks_faction_id: ""
    unlock_conditions: []

  - id: "zone_misty_lake"
    name_key: "雾之湖"
    description_key: "通往红魔馆的必经之路。"
    max_clear_count: 10
    unlocks_zone_id: "zone_youkai_trail"
    unlocks_faction_id: "faction_scarlet_devil"
    unlock_conditions:
      - { condition_type: "ZoneCleared", target_id: "zone_forest_of_magic", required_value: 10 }

  - id: "zone_youkai_trail"
    name_key: "妖怪小道"
    description_key: "通往妖怪山的蜿蜒小路。"
    max_clear_count: 10
    unlocks_zone_id: ""
    unlocks_faction_id: "faction_youkai_mountain"
    unlock_conditions:
      - { condition_type: "ZoneCleared", target_id: "zone_misty_lake", required_value: 10 }
