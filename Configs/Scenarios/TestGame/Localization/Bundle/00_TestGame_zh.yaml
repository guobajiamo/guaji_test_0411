# 多语言表 - 中文
# 前期如果还不想认真配表，也没关系。
# 代码里会优先查表，查不到就直接把 key 当成显示文字返回。

# 本文件是“测试剧本专用中文翻译表”。
# 结构与全局 locale_zh.yaml 相同，但只在测试剧本作用域内生效。
#
# 顶层键说明：
# locale: 语言代号
# translations: 翻译表
#
# 使用建议：
# - 如果某些文本只属于测试剧本，可以优先写在这里。
# - key 与 value 建议都加双引号，减少解析风险。
#
locale: "zh"
translations:
  "采集素材": "采集素材"
  "木材": "木材"
