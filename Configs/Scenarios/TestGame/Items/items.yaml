# Legacy scenario-local reference only.
# The authoritative shared item library lives in res://Configs/Items/Definitions.
# Keep UTF-8 when editing so existing Chinese text stays intact.
#
# 本文件是“测试剧本专用物品表”。
# 字段含义与 Configs/Items/items.yaml 相同，只是这里的数据只会被测试剧本读取。
#
# 常用字段回顾：
# id: 物品唯一 ID
# parent_id: 所属分类 ID
# name_key / description_key / detail_description_key: 显示文本
# definition_order: 同分类排序值，越小越靠前，建议按 100 间隔
# base_rarity: Common / Uncommon / Rare / Epic / Legendary
# is_stackable: 是否可堆叠（false 时同物品按单格占位显示）
# base_max_stack: 历史字段；当前可堆叠物品默认无限堆叠
# buy_price / sell_price: 买入价 / 卖出价
# tags: 物品标签数组，可多选
#   推荐先标注大类：Currency / Material / Consumable / Battle / Tool / Special / Other
# has_durability / max_durability: 是否启用耐久及其上限
# acquisition_hint_key: 获取提示
# hover_info_fields / detail_info_fields: 悬浮窗与详细页字段顺序（可选）
# hover_extra_lines / detail_extra_lines: 额外说明文本（可选）
# tool_bonuses:
#   log_yield_multiplier: 产出倍率
#   chop_speed_multiplier: 速度倍率
#
# 测试剧本里新增的钓鱼相关物品也在这里配置：
# - tool_fishing_rod: 鱼竿
# - bait_worm: 蚯蚓鱼饵
# - mat_carp: 鲤鱼
#
