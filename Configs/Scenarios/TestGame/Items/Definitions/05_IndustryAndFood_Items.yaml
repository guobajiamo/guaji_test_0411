items:
  - id: "food_tricolor_dango"
    parent_id: "consumable_cooking"
    name_key: "三色团子"
    description_key: "甜糯的三色团子，食用后能短时间大幅强化采集效率"
    detail_description_key: "食用后获得“干劲十足”：采集速度提升100%（读条耗时减少50%），采集产出提升100%，持续30分钟，可叠加持续时间。"
    definition_order: 400
    base_rarity: "Rare"
    is_stackable: true
    sell_price: 12
    tags: ["Consumable", "Food"]
    consume_buff:
      buff_id: "buff_dango_motivation"
      display_name: "干劲十足"
      description: "使用以后有采集速度提升100%（读条耗时减少50%），采集产出数量提升100%，持续30分钟，多次服用可延长持续时间。"
      duration_seconds: 1800
      extend_duration_on_reapply: true
      stat_modifiers:
        - { stat_id: "idle.speed.skill_chopping.multiplier", multiplier: 2.0 }
        - { stat_id: "idle.speed.skill_fishing.multiplier", multiplier: 2.0 }
        - { stat_id: "idle.speed.skill_mining.multiplier", multiplier: 2.0 }
        - { stat_id: "idle.output.skill_chopping.multiplier", multiplier: 2.0 }
        - { stat_id: "idle.output.skill_fishing.multiplier", multiplier: 2.0 }
        - { stat_id: "idle.output.skill_mining.multiplier", multiplier: 2.0 }

