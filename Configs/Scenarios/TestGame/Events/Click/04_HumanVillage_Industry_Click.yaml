events:
  - id: "evt_go_to_my_farmland"
    name_key: "前往我的农田"
    description_key: "前往农务技能管理界面。"
    hover_info_key: "点击后自动切换到左侧技能模式，并定位到“种田”技能页。"
    type: "RepeatableClick"
    display_condition_count: 0
    display_conditions: []
    interaction_condition_count: 0
    interaction_conditions: []
    hide_condition_count: 0
    hide_conditions: []
    costs: []
    effects:
      - { effect_type: "SwitchToSkillMode", target_id: "skill_farming", int_value: 1 }
    button_list_group: "MainClick"

