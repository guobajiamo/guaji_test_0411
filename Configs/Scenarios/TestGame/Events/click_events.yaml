# 本文件是“测试剧本专用单次点击/可重复点击事件表”。
# 这里同样采用新三段条件写法。
#
# 顶层键说明：
# events: 事件列表。
#
# 单个事件常用字段：
# id / name_key / description_key / hover_info_key:
#   基础显示信息。
# type:
#   这里通常写 "RepeatableClick"。
#
# 三段条件字段：
# display_condition_count + display_conditions:
#   决定按钮何时出现。
# interaction_condition_count + interaction_conditions:
#   决定按钮出现后何时可点亮。
# hide_condition_count + hide_conditions:
#   决定按钮在后期何时彻底隐藏。
#   三个 *_count 都必须与对应列表条数一致，否则会报错。
#
# costs:
#   每点击一次扣除一次。
# effects:
#   每点击一次结算一次。
# button_list_group:
#   一般写 MainClick。
#
# 本文件里你可以直接参考两个典型范例：
# - evt_get_worm_bait:
#   无显示前置、无互动前置，开局可见且可点。
# - evt_empty_hook_fishing:
#   用 display_conditions 控制“持有鱼竿且完成对话后才显示”。
#
events:
  # 过期测试事件（已停用）：
  # - id: "evt_click_chop"
  #   name_key: "点击砍树"
  #   description_key: "手动砍一下树，立刻获得 1 个原木。"
  #   hover_info_key: "手动执行一次砍树动作，适合一点点体验流程时使用。"
  #   type: "RepeatableClick"
  #   display_condition_count: 0
  #   display_conditions: []
  #   interaction_condition_count: 1
  #   interaction_conditions:
  #     - { condition_type: "HasItem", target_id: "tool_stone_axe", required_value: 1 }
  #   hide_condition_count: 0
  #   hide_conditions: []
  #   costs: []
  #   effects:
  #     - { effect_type: "GrantItem", target_id: "mat_wood_log", int_value: 1 }
  #   button_list_group: "MainClick"

  - id: "evt_get_worm_bait"
    name_key: "获取 3 个蚯蚓鱼饵"
    description_key: "从渔具屋领取三份最基础的蚯蚓鱼饵。"
    hover_info_key: "用于测试挂机钓鱼事件的互动条件与自动扣除逻辑。"
    type: "RepeatableClick"
    display_condition_count: 0
    display_conditions: []
    interaction_condition_count: 0
    interaction_conditions: []
    hide_condition_count: 0
    hide_conditions: []
    costs: []
    effects:
      - { effect_type: "GrantItem", target_id: "bait_worm", int_value: 3 }
    button_list_group: "MainClick"

  - id: "evt_empty_hook_fishing"
    name_key: "姜太公钓鱼"
    description_key: "空钩试手，演示“满足显示条件后才出现按钮”的事件。"
    hover_info_key: "需要先持有鱼竿，并完成一次性事件“与太公望对话”，按钮才会显示。"
    type: "RepeatableClick"
    display_condition_count: 2
    display_conditions:
      - { condition_type: "HasItem", target_id: "tool_fishing_rod", required_value: 1 }
      - { condition_type: "EventCompleted", target_id: "evt_talk_to_taigongwang", required_value: 1 }
    interaction_condition_count: 0
    interaction_conditions: []
    hide_condition_count: 0
    hide_conditions: []
    costs: []
    effects:
      - { effect_type: "GrantItem", target_id: "mat_carp", int_value: 1 }
      - { effect_type: "GrantSkillExp", target_id: "skill_fishing", int_value: 6 }
    button_list_group: "MainClick"
