events:
  - id: "evt_idle_draw_water"
    name_key: "打水"
    description_key: "从水井亭持续打水。"
    hover_info_key: "基础读条 1.0 秒，每轮获得清水 x1。该事件不依赖技能，但会受全局挂机速度和产出加成影响。"
    type: "IdleLoop"
    display_condition_count: 0
    display_conditions: []
    interaction_condition_count: 0
    interaction_conditions: []
    hide_condition_count: 0
    hide_conditions: []
    base_interval_seconds: 1.0
    base_output_amount: 1.0
    costs: []
    rewards:
      - { item_id: "mat_water", amount: 1, drop_chance: 1.0 }
    button_list_group: "MainIdle"

  - id: "evt_idle_smith_iron_ingot"
    name_key: "锻造铁锭"
    description_key: "持续消耗木炭与铁矿石，自动锻造铁锭。"
    hover_info_key: "每轮消耗木炭 x1、铁矿石 x1，获得铁锭 x1；材料不足时自动停止。"
    type: "IdleLoop"
    display_condition_count: 0
    display_conditions: []
    interaction_condition_count: 1
    interaction_conditions:
      - { condition_type: "SkillLevel", target_id: "skill_smithing", required_value: 1 }
    hide_condition_count: 0
    hide_conditions: []
    costs:
      - { item_id: "mat_charcoal", amount: 1 }
      - { item_id: "mat_iron_ore", amount: 1 }
    rewards:
      - { item_id: "mat_iron_ingot", amount: 1, drop_chance: 1.0 }
    linked_skill_id: "skill_smithing"
    button_list_group: "MainIdle"

  - id: "evt_idle_charcoal_kiln"
    name_key: "烧炭"
    description_key: "持续烧制木炭。"
    hover_info_key: "每轮消耗原木 x5，获得木炭 x5；原木不足时自动停止挂机。"
