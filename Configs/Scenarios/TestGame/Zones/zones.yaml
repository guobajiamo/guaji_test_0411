# 本文件是“测试剧本专用 zone 配置”。
# 字段结构与 Configs/Zones/zones.yaml 相同。
#
# 常用字段回顾：
# id: zone 唯一 ID
# name_key: 区域名
# description_key: 区域说明
# max_clear_count: 参考通关上限
# unlocks_zone_id: 推进后解锁的后续 zone
# unlocks_faction_id: 推进后解锁的势力
# unlock_conditions:
#   条件列表，格式为 condition_type / target_id / required_value
#
zones:
  - id: "zone_forest_of_magic"
    name_key: "魔法之森"
    description_key: "充满危险蘑菇和妖精的森林。"
    max_clear_count: 10
    unlocks_zone_id: "zone_misty_lake"
    unlocks_faction_id: ""
    unlock_conditions: []

  - id: "zone_misty_lake"
    name_key: "雾之湖"
    description_key: "通往红魔馆的必经之路。"
    max_clear_count: 10
    unlocks_zone_id: "zone_youkai_trail"
    unlocks_faction_id: "faction_scarlet_devil"
    unlock_conditions:
      - { condition_type: "ZoneCleared", target_id: "zone_forest_of_magic", required_value: 10 }

  - id: "zone_youkai_trail"
    name_key: "妖怪小道"
    description_key: "通往妖怪山的蜿蜒小路。"
    max_clear_count: 10
    unlocks_zone_id: ""
    unlocks_faction_id: "faction_youkai_mountain"
    unlock_conditions:
      - { condition_type: "ZoneCleared", target_id: "zone_misty_lake", required_value: 10 }
