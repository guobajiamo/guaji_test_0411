# 本文件是“测试剧本专用技能表”。
# 字段含义与 Configs/Skills/skills.yaml 相同。
#
# 常用字段回顾：
# id: 技能唯一 ID
# name_key / description_key: 技能名称和描述
# max_level: 最大等级
# initial_level: 初始等级
# max_total_exp: 总经验上限
# required_tool_tag: 启动技能时要求的工具标签；None 表示不要求工具
# primary_output_item_id: 该技能主要产出物
# level_table:
#   level: 当前等级
#   exp_to_next: 升到下一级所需经验
#   output: 每轮基础产出
#   interval: 每轮基础时长（秒）
#
# 目前测试剧本里：
# - skill_chopping: 砍树
# - skill_fishing: 钓鱼，数值曲线复制砍树
#
skills:
