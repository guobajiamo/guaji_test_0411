# 物品分类定义
# id: 全小写下划线，唯一标识
# parent_id: 父分类ID，根分类留空
# name_key: 名称（前期直接写中文，后期可作为多语言 key）
# description_key: 描述文本
# definition_order: 同级内的默认排序，建议按 100、200、300 递增
# is_visible: 这个分类是否默认显示在 UI 中

# 本文件用于定义“物品分类树”。
# 作用：决定背包/图鉴中的分类层级、显示顺序、是否显示空分类。
#
# 顶层键说明：
# categories: 分类列表。
#
# 单个分类支持的字段：
# id:
#   分类唯一 ID。
#   建议只用英文小写、数字、下划线，例如 "consumable_ingredient"。
#   这个值会被 parent_id、物品的 parent_id 引用，后续尽量不要随便改名。
# parent_id:
#   父分类 ID。
#   留空字符串 "" 表示它是根分类。
#   填写后会挂到对应父分类下面，形成树结构。
# name_key:
#   分类显示名称。
#   当前项目里可以直接写中文。
#   如果后续走多语言，也可以把它当作翻译 key。
# description_key:
#   分类描述文本。
#   当前也可以直接写中文，用于说明该分类的用途。
# definition_order:
#   同一父分类下的默认排序值，数值越小越靠前。
#   它只影响“同级顺序”，不影响父子关系。
#   推荐按 100、200、300 递增，便于以后在中间插入新分类。
#   例如已有 100 和 200 时，后续插入新分类可以写 150。
#   技术上可填任意整数，但建议保持正整数且预留间隔。
# is_visible:
#   是否默认在 UI 中显示这个分类。
#   true = 默认显示。
#   false = 分类存在，但默认不展示。
# hide_when_empty:
#   当该分类及其子项没有可显示内容时，是否自动隐藏。
#   当前文件里可以不写；不写时加载器默认按 false 处理。
#   适合后期做“空分类自动折叠/隐藏”时使用。
#
categories:
  - id: "gathering_material"
    parent_id: ""
    name_key: "采集素材"
    description_key: "通过采集获得的基础素材"
    definition_order: 100
    is_visible: true

  - id: "mat_wood"
    parent_id: "gathering_material"
    name_key: "木材"
    description_key: "各类木质素材"
    definition_order: 100
    is_visible: true

  - id: "consumable"
    parent_id: ""
    name_key: "消耗品"
    description_key: "使用后会被消耗的物品"
    definition_order: 200
    is_visible: true

  - id: "consumable_cooking"
    parent_id: "consumable"
    name_key: "烹饪食品"
    description_key: "通过烹饪制作出的成品食物"
    definition_order: 100
    is_visible: true

  - id: "consumable_ingredient"
    parent_id: "consumable"
    name_key: "食材"
    description_key: "用于烹饪的基础原料"
    definition_order: 200
    is_visible: true

  - id: "tool"
    parent_id: ""
    name_key: "工具"
    description_key: "用于采集与互动的工具"
    definition_order: 300
    is_visible: true
