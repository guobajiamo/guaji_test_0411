# NOTE: exp_to_next now stores cumulative XP threshold for this level (Melvor XP column), not per-level difference.
# ============================================================
# 文件名：skill_exp_table.yaml
# 位置：Configs/Skills/skill_exp_table.yaml
# 用途：通用技能经验值参考表（只读文档，不被代码直接加载）
#
# ──────────────────────────────────────────────────────────
# 【本文件的定位】
#   本文件是一份"经验值设计文档"，供策划阅读和对照。
#   当前代码体系中，每个技能的 level_table 是写在各自的
#   skills.yaml 里的（内嵌 exp_to_next），不从本文件读取引用。
#   因此，如果你修改了本文件，必须同步手动修改对应技能的
#   skills.yaml，才能真正生效。
#
# ──────────────────────────────────────────────────────────
# 【两套经验值系统说明】
#
# ★ 系统 A：自设线性经验值系统（已废弃，仅作历史记录）
#   - 等级上限：20 级
#   - 升级所需经验（exp_to_next）从 180 开始，每级递增 180
#     即：180, 360, 540, 720 … 3420（等差数列，公差 180）
#   - 满级总累计经验：34200
#   - 曲线特点：完全线性，升级所需经验随等级单调递增，
#     早期升级非常快，后期变慢，但整体难度较低。
#   - 适合场景：测试/原型阶段，或需要"感受明显升级"的
#     早期体验关卡（≤20 级）。
#
# ★ 系统 B：梅尔沃放置（Melvor Idle）官方经验值系统（当前使用）
#   - 等级上限：120 级（需要 DLC"Herald 王座"开启 100~120 级）
#   - 升级所需经验遵循官方公式：
#       累计经验(L) = ⌊ (1/4) × Σ(ℓ=1 to L-1) ⌊ ℓ + 300 × 2^(ℓ/7) ⌋ ⌋
#   - 满级（120 级）累计总经验：104,273,167
#   - 曲线特点：指数增长，约每 7 级经验需求翻倍；
#     1~92 级所需经验 ≈ 92~99 级所需经验，
#     后期每一级都需要数百万乃至千万经验。
#   - 里程碑：
#       50  级：  101,333 累计经验
#       70  级：  737,627 累计经验
#       99  级：13,034,431 累计经验（技能披风解锁点）
#      120  级：104,273,167 累计经验（最高等级）
#   - 适合场景：追求长期成长、数值深度大的放置游戏。
#
# ──────────────────────────────────────────────────────────
# 【如何对不同技能引用不同的经验值系统】
#
#   目前代码不支持"引用共享经验表 ID"，每个技能只能在自己的
#   skills.yaml 里内嵌完整的 level_table。
#
#   操作方法：
#   1. 打开目标技能的 skills.yaml（或 Definitions/ 下对应文件）。
#   2. 将 max_level、max_total_exp 改为目标系统的数值。
#   3. 将 level_table 替换为下方对应系统的 exp_to_next 列表，
#      并按需填入该技能自己的 output / interval 数值。
#
#   示例（伪代码）：
#     # 使用系统 A（20 级）
#     max_level: 20
#     max_total_exp: 34200
#     level_table:
#       - { level: 1, exp_to_next: 180, output: 5.0, interval: 6.0 }
#       ...（共 20 行，exp_to_next 参照下方 system_a_reference）
#
#     # 使用系统 B（120 级）
#     max_level: 120
#     max_total_exp: 104273167
#     level_table:
#       - { level: 1, exp_to_next: 83, output: 5.0, interval: 6.0 }
#       ...（共 120 行，exp_to_next 参照下方 system_b_reference）
#
# ============================================================


# ──────────────────────────────────────────────────────────
# 系统 A：自设线性经验值系统（历史记录）
#   仅记录 exp_to_next；output/interval 由各技能自定义。
# ──────────────────────────────────────────────────────────
system_a_reference:
  name: "自设线性经验值系统"
  max_level: 20
  max_total_exp: 34200
  formula: "exp_to_next(L) = 180 × L（等差，公差 180）"
  note: "完全线性，早期升级快，适合原型测试；目前已被系统 B 替代。"
  level_exp_to_next:
    - { level: 1,  exp_to_next: 180 }
    - { level: 2,  exp_to_next: 360 }
    - { level: 3,  exp_to_next: 540 }
    - { level: 4,  exp_to_next: 720 }
    - { level: 5,  exp_to_next: 900 }
    - { level: 6,  exp_to_next: 1080 }
    - { level: 7,  exp_to_next: 1260 }
    - { level: 8,  exp_to_next: 1440 }
    - { level: 9,  exp_to_next: 1620 }
    - { level: 10, exp_to_next: 1800 }
    - { level: 11, exp_to_next: 1980 }
    - { level: 12, exp_to_next: 2160 }
    - { level: 13, exp_to_next: 2340 }
    - { level: 14, exp_to_next: 2520 }
    - { level: 15, exp_to_next: 2700 }
    - { level: 16, exp_to_next: 2880 }
    - { level: 17, exp_to_next: 3060 }
    - { level: 18, exp_to_next: 3240 }
    - { level: 19, exp_to_next: 3420 }
    - { level: 20, exp_to_next: 0    }   # 满级，无下一级


# ──────────────────────────────────────────────────────────
# 系统 B：梅尔沃放置（Melvor Idle）官方经验值系统
#   来源：https://wiki.melvoridle.com/w/Experience_Table
#   仅记录 exp_to_next（即相邻两级累计经验之差）；
#   output/interval 由各技能自定义。
#
#   列说明：
#     level        ：当前等级
#     cumulative   ：到达本级所需的累计总经验（参考信息）
#     exp_to_next  ：从本级升到下一级所需经验（技能 YAML 中填写此值）
# ──────────────────────────────────────────────────────────
system_b_reference:
  name: "梅尔沃放置官方经验值系统"
  max_level: 120
  max_total_exp: 104273167
  formula: "cumulative(L) = floor( (1/4) * sum(ℓ=1 to L-1)[ floor(ℓ + 300 * 2^(ℓ/7)) ] )"
  note: >
    指数增长，约每 7 级需求翻倍；99 级里程碑（技能披风）≈ 1303 万经验；
    120 级满级 ≈ 1.04 亿经验。适合有长期游戏深度需求的技能。
  level_exp_to_next:
    # ─── 1 ~ 10 ───────────────────────────────────────────
    - { level: 1,   cumulative: 0,        exp_to_next: 0       }
    - { level: 2,   cumulative: 83,        exp_to_next: 83       }
    - { level: 3,   cumulative: 174,        exp_to_next: 174      }
    - { level: 4,   cumulative: 276,        exp_to_next: 276      }
    - { level: 5,   cumulative: 388,        exp_to_next: 388      }
