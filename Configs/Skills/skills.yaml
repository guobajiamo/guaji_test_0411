      - { level: 7, exp_to_next: 1260, output: 19.211, interval: 4.737 }
      - { level: 8, exp_to_next: 1440, output: 21.579, interval: 4.526 }
      - { level: 9, exp_to_next: 1620, output: 23.947, interval: 4.316 }
