# 本文件用于配置“图片主题按钮”和“主菜单背景图”。
# 它既支持直接引用图片，也支持在图片缺失时使用纯色回退。
#
# 顶层分组说明：
# menu_background:
#   主菜单背景图配置。
# buttons:
#   各类按钮样式配置。
#
# menu_background 字段：
# fallback_color:
#   当背景图无法加载时使用的纯色背景。
# image_path:
#   背景图资源路径。
#   建议使用 Godot 资源路径格式，如：
#   res://Assets/UI/Images/MainMenu/main_menu_background.png
#
# buttons 下每个按钮样式键都代表一类按钮，例如：
# menu_primary / menu_test_entry / event_oneshot / event_click / event_idle / system_action
#
# 单个按钮样式支持的字段：
# normal_image / hover_image / pressed_image / disabled_image:
#   四种状态下的图片资源路径。
#   如果路径为空或图片不存在，系统会自动使用下面的 fallback 颜色。
# fallback_normal_color / fallback_hover_color / fallback_pressed_color / fallback_disabled_color:
#   四种状态的纯色回退色。
# text_color:
#   普通状态文字颜色。
# disabled_text_color:
#   禁用状态文字颜色。
# border_color:
#   纯色回退按钮的边框色。
#
# 使用建议：
# - 想快速试布局时，只改 fallback 颜色也能正常显示。
# - 正式美术资源齐全后，再把四张状态图都补上。
#
menu_background:
  fallback_color: "#070b14"
  image_path: "res://Picture_Resource/Main_Menu/Main_Menu_Background_Pic.png"

buttons:
  menu_primary:
    normal_image: "res://Assets/UI/Images/Buttons/menu_primary_normal.png"
