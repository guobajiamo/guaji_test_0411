# 本文件用于配置“游戏内容界面的整体视觉主题”。
# 它只影响显示效果，不影响数值逻辑。
#
# 顶层分组说明：
# general:
#   尺寸、留白、字号等基础布局参数。
# panels:
#   各面板的底色、透明度、边框色。
# tabs:
#   中间标签页的文本和配色。
# status:
#   右下人物状态面板的配色与文案。
# labels:
#   其他零散 UI 文案格式。
# region_accents:
#   区域标题风格预设，给 gameplay_layout.yaml 的 accent 字段引用。
#
# general 常用字段：
# background_color:
#   主界面背景色，建议填十六进制颜色，如 "#000000"。
# outer_margin:
#   整个主界面距离窗口边缘的外边距，单位像素。
# section_gap:
#   各大分区之间的间距。
# inner_gap:
#   分区内部控件的间距。
# left_right_column_width:
#   左栏和右栏基础宽度。
# top_bar_height:
#   顶部状态条高度。
# bottom_log_height:
#   底部日志展开状态高度。
# info_panel_min_height:
#   右上信息面板最小高度。
# tab_bar_height:
#   中间标签栏高度。
# scene_card_min_width:
#   子场景卡片最小宽度。
# scene_button_min_height:
#   事件按钮最小高度。
# progress_bar_height:
#   进度条高度。
# region_header_font_size / region_item_font_size / region_count_font_size:
#   左侧区域标题、区域项、计数字号。
# scene_title_font_size / body_font_size:
#   子场景标题和正文文字字号。
# tab_font_size / tab_active_font_size:
#   标签普通态 / 激活态字号。
# status_header_font_size / status_body_font_size:
#   右下状态标题 / 正文字号。
# corner_radius:
#   统一圆角大小。
#
# panels 下每个面板都支持：
# color:
#   底色。
# alpha:
#   底色透明度，常见范围 0.0 到 1.0。
# border_color:
#   边框色。
# border_alpha:
#   边框透明度，常见范围 0.0 到 1.0。
#
# tabs 下常用字段：
# current_region_text / inventory_text / skills_text / dictionary_text / system_text:
#   标签名称。
# normal_color / active_color:
#   普通态 / 激活态底色。
# normal_alpha / active_alpha:
#   普通态 / 激活态透明度。
# normal_text_color / active_text_color:
#   标签文字颜色。
# border_color:
#   标签边框色。
#
# status 下常用字段：
# header_text_color / body_text_color / accent_text_color:
#   标题 / 正文 / 强调文字颜色。
# progress_fill_color / progress_background_color:
#   进度条填充色 / 背景色。
# target_title / skills_title / status_title / currency_title / reputation_title:
#   各区块标题。
# resting_text / empty_status_text / empty_reputation_text:
#   空状态或默认状态文案。
#
# labels 下常用字段：
# top_bar_scenario_format / top_bar_area_format:
#   顶部信息格式字符串，通常带 {0} 占位符。
# interaction_count_format:
#   左侧区域可互动数量显示格式。
# idle_marker_text:
#   挂机中的标记文本。
# empty_scene_text / empty_area_text / favorite_hint_text:
#   无内容时的提示文案。
#
# region_accents:
#   每个 accent 键都支持：
#   text_color: 文字颜色
#   font_size: 字号
#   可在 gameplay_layout.yaml 中通过 accent: "xxx" 引用。
#
general:
  background_color: "#0b0f12"
  outer_margin: 20
  section_gap: 16
  inner_gap: 12
  left_right_column_width: 336
  top_bar_height: 54
  bottom_log_height: 196
  info_panel_min_height: 240
  tab_bar_height: 54
  scene_card_min_width: 300
  scene_button_min_height: 56
  progress_bar_height: 12
  region_header_font_size: 26
